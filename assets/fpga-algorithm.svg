<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 920" style="font-family:'DM Sans',sans-serif">
<rect width="860" height="920" fill="#F5F4F0" rx="12"/>

<defs>
<marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L10,5 L0,9 Z" fill="#666"/></marker>
</defs>

<g stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#a)">
<!-- Top row connections from parallel -->
<polyline points="310,175 310,145 180,145 180,170"/>
<polyline points="310,175 310,145 480,145 480,170"/>
<polyline points="310,175 310,145 680,145 680,170"/>

<!-- Сбор информации → БД -->
<line x1="600" y1="75" x2="680" y2="75"/>

<!-- Получение → Обработка -->
<line x1="180" y1="215" x2="180" y2="245"/>
<line x1="480" y1="215" x2="480" y2="245"/>
<line x1="680" y1="215" x2="680" y2="245"/>

<!-- Обработка → Вычисление -->
<polyline points="180,295 180,325 430,325 430,345"/>
<polyline points="480,295 480,325 430,325"/>
<polyline points="680,295 680,325 430,325"/>

<!-- Вычисление → Поиск -->
<line x1="430" y1="390" x2="430" y2="415"/>

<!-- БД → Поиск (справа) -->

<polyline points="790,75 790,435 530,435"/>

<!-- Поиск → Определение -->
<line x1="430" y1="470" x2="430" y2="500"/>

<!-- Определение → Прогнозирование -->
<line x1="430" y1="555" x2="430" y2="585"/>

<!-- Прогнозирование → Погрешность -->
<line x1="430" y1="650" x2="430" y2="680"/>

<!-- Погрешность → Ромб -->
<line x1="430" y1="725" x2="430" y2="750"/>

<!-- Ромб → Да → БД -->
<polyline points="430,870 430,895 810,895 810,75 730,75"/>

<!-- Ромб → Нет → Вычисление -->
<polyline points="545,810 610,810 610,370 530,370"/>
</g>

<!-- Parallel mode symbol -->
<g transform="translate(280,175)">
<rect x="0" y="0" width="60" height="6" fill="none"/>
<circle cx="20" cy="0" r="4" fill="#555"/>
<circle cx="30" cy="0" r="4" fill="#555"/>
<circle cx="40" cy="0" r="4" fill="#555"/>
</g>

<!-- Сбор информации для БД -->
<rect x="390" y="50" width="200" height="50" rx="8" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<text x="490" y="72" text-anchor="middle" font-size="13" fill="#1A1A1A">Сбор информации</text>
<text x="490" y="90" text-anchor="middle" font-size="13" fill="#1A1A1A">для БД</text>

<!-- БД (cylinder) -->
<g transform="translate(690,42)">
<ellipse cx="35" cy="8" rx="35" ry="10" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<rect x="0" y="8" width="70" height="50" fill="white"/>
<line x1="0" y1="8" x2="0" y2="58" stroke="#2D2D2D" stroke-width="1.5"/>
<line x1="70" y1="8" x2="70" y2="58" stroke="#2D2D2D" stroke-width="1.5"/>
<ellipse cx="35" cy="58" rx="35" ry="10" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<text x="35" y="40" text-anchor="middle" font-size="14" font-weight="500" fill="#1A1A1A">БД</text>
</g>

<!-- Получение 1 пакета -->
<rect x="80" y="170" width="200" height="45" rx="8" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<text x="180" y="190" text-anchor="middle" font-size="12" fill="#1A1A1A">Получение 1 пакета</text>
<text x="180" y="206" text-anchor="middle" font-size="12" fill="#1A1A1A">данных СЗЗ</text>

<!-- Получение n пакета -->
<rect x="380" y="170" width="200" height="45" rx="8" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<text x="480" y="190" text-anchor="middle" font-size="12" fill="#1A1A1A">Получение n пакета</text>
<text x="480" y="206" text-anchor="middle" font-size="12" fill="#1A1A1A">данных СЗЗ</text>

<!-- Получение n+1 пакета -->
<rect x="580" y="170" width="200" height="45" rx="8" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<text x="680" y="190" text-anchor="middle" font-size="12" fill="#1A1A1A">Получение n+1 пакета</text>
<text x="680" y="206" text-anchor="middle" font-size="12" fill="#1A1A1A">данных СЗЗ</text>

<!-- Обработка 1 -->
<rect x="80" y="245" width="200" height="50" rx="8" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<text x="180" y="266" text-anchor="middle" font-size="12" fill="#1A1A1A">Обработка данных СЗЗ</text>
<text x="180" y="283" text-anchor="middle" font-size="12" fill="#1A1A1A">(нейронная сеть)</text>

<!-- Обработка n -->
<rect x="380" y="245" width="200" height="50" rx="8" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<text x="480" y="266" text-anchor="middle" font-size="12" fill="#1A1A1A">Обработка данных СЗЗ</text>
<text x="480" y="283" text-anchor="middle" font-size="12" fill="#1A1A1A">(нейронная сеть)</text>

<!-- Обработка n+1 -->
<rect x="580" y="245" width="200" height="50" rx="8" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<text x="680" y="266" text-anchor="middle" font-size="12" fill="#1A1A1A">Обработка данных СЗЗ</text>
<text x="680" y="283" text-anchor="middle" font-size="12" fill="#1A1A1A">(нейронная сеть)</text>

<!-- Вычисление градиентов -->
<rect x="280" y="345" width="300" height="45" rx="8" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<text x="430" y="364" text-anchor="middle" font-size="12" fill="#1A1A1A">Вычисление градиентов</text>
<text x="430" y="381" text-anchor="middle" font-size="12" fill="#1A1A1A">полученных характеристик</text>

<!-- Поиск соответствия -->
<rect x="280" y="415" width="300" height="55" rx="8" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<text x="430" y="436" text-anchor="middle" font-size="12" fill="#1A1A1A">Поиск соответствия полученных</text>
<text x="430" y="453" text-anchor="middle" font-size="12" fill="#1A1A1A">данных с данными из БД (ПЛИС)</text>

<!-- Определение недостающих -->
<rect x="280" y="500" width="300" height="55" rx="8" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<text x="430" y="521" text-anchor="middle" font-size="12" fill="#1A1A1A">Определение недостающих</text>
<text x="430" y="538" text-anchor="middle" font-size="12" fill="#1A1A1A">характеристик методом</text>
<text x="430" y="550" text-anchor="middle" font-size="11" fill="#1A1A1A">полного перебора (ПЛИС)</text>

<!-- Прогнозирование -->
<rect x="280" y="585" width="300" height="65" rx="8" fill="#DDF2EC" stroke="#2D2D2D" stroke-width="1.5"/>
<line x1="292" y1="585" x2="292" y2="650" stroke="#2D2D2D" stroke-width="0.8"/>
<line x1="568" y1="585" x2="568" y2="650" stroke="#2D2D2D" stroke-width="0.8"/>
<text x="430" y="614" text-anchor="middle" font-size="13" fill="#1A1A1A">Прогнозирование процессов</text>
<text x="430" y="634" text-anchor="middle" font-size="13" fill="#1A1A1A">гидродинамики водоема</text>

<!-- Определение погрешности -->
<rect x="280" y="680" width="300" height="45" rx="8" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<text x="430" y="699" text-anchor="middle" font-size="12" fill="#1A1A1A">Определение погрешности</text>
<text x="430" y="716" text-anchor="middle" font-size="12" fill="#1A1A1A">моделирования</text>

<!-- Ромб (условие) -->
<polygon points="430,750 545,810 430,870 315,810" fill="white" stroke="#2D2D2D" stroke-width="1.5"/>
<text x="430" y="797" text-anchor="middle" font-size="11" fill="#1A1A1A">Величина погрешности</text>
<text x="430" y="813" text-anchor="middle" font-size="11" fill="#1A1A1A">попадает в заданный</text>
<text x="430" y="829" text-anchor="middle" font-size="11" fill="#1A1A1A">диапазон?</text>

<!-- Labels -->
<text x="555" y="800" font-size="13" fill="#888" font-weight="500">Нет</text>
<text x="438" y="893" font-size="13" fill="#888" font-weight="500">Да</text>

</svg>
